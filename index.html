<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSLG Official Website</title>
    <style>
        /* --- 1. GENERAL DESIGN --- */
        * { box-sizing: border-box; } /* Para hindi lumampas sa screen */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background: url('https://file.garden/aQ1RSq80InNm8Bm5/82302413_112900173776766_7229938772589150208_n.jpg') no-repeat center center fixed;
            background-size: cover;
            color: black;
            overflow-x: hidden;
        }

        /* --- 2. HEADER --- */
        header {
            background-color: darkred;
            min-height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        .logo-section { display: flex; align-items: center; color: white; gap: 10px; cursor: pointer; }
        .logo-section img { width: 45px; height: 45px; border-radius: 50%; background: white; }
        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; flex-wrap: wrap; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* --- 3. PAGE CONTENT & AUTO-FIT IMAGE --- */
        .page { display: none; padding: 20px 5%; min-height: 80vh; text-align: center; }
        .active { display: block; }
        
        .glass-container { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 20px;
            border-radius: 30px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 950px; /* Sukat sa laptop */
            margin: 20px auto;
        }

        /* ITO ANG PINAKABINAGO PARA SA HOME IMAGE */
        .glass-container img {
            width: 100%;        /* Pasok sa loob ng border sa phone */
            max-width: 890px;   /* Sakto sa size na gusto mo sa laptop */
            height: auto;
            border-radius: 15px;
            display: block;
            margin: 15px auto;
        }

        /* Officers Cards */
        .card { 
            background: white; padding: 15px; border-radius: 15px; 
            display: inline-block; width: 140px; margin: 10px; 
            border-top: 5px solid #004488; vertical-align: top;
        }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }

        footer { text-align: center; padding: 15px; background-color: #333; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-section" onclick="changePage('home')">
            <img src="https://image2url.com/r2/default/images/1773496607867-2566cc21-cab5-4ec7-b782-7ab7062f801b.jpg">
            <span style="font-size: 14px;">MNHS SSLG</span>
        </div>
        <nav>
            <ul>
                <li><a onclick="changePage('home')">Home</a></li>
                <li><a onclick="changePage('officers')">Officers</a></li>
                <li><a onclick="changePage('events')">Events</a></li>
                <li><a onclick="changePage('feedback')">Feedback</a></li>
            </ul>
        </nav>
    </header>

    <div id="home" class="page active">
        <div class="glass-container">
            <h1>Welcome To Muntindilaw National High School SSLG</h1>
            <p>Ang official portal ng SSLG.</p>
            <img src="https://image2url.com/r2/default/images/1773497175854-64935e38-4b81-4721-a311-ff89a7e2c1dd.jpg">
        </div>
    </div>

    <div id="officers" class="page">
        <div class="glass-container">
            <h2>SSLG Officers</h2>
            <div class="card">
                <img src="https://file.garden/aQ1RSq80InNm8Bm5/09454c72-4b64-41a0-8b12-914fb2bbbf7e.jpg">
                <p><strong>Rheya Shainaya</strong><br>President</p>
            </div>
        </div>
    </div>

    <script>
        function changePage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
